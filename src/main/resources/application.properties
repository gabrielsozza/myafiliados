# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# APLICAÇÃO
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.application.name=myafiliados-api
# Porta dinâmica em produção (Railway/Render). Local: 8090 pra não colidir
# com mydelivery-api rodando em 8080.
server.port=${PORT:8090}
spring.config.import=optional:file:./.env[.properties]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# BANCO DE DADOS — myafiliados
# Em produção: setar DB_URL_AFILIADOS, DB_USERNAME_AFILIADOS, DB_PASSWORD_AFILIADOS
# Local: usa MySQL local com banco "myafiliados"
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.datasource.url=${DB_URL_AFILIADOS:jdbc:mysql://localhost:3306/myafiliados?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME_AFILIADOS:root}
spring.datasource.password=${DB_PASSWORD_AFILIADOS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — pool de conexões. Dimensionado pra demanda menor que o mydelivery
# (afiliados não tem polling intensivo — só dashboard e webhook).
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JPA / HIBERNATE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JWT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Em produção: setar JWT_SECRET_AFILIADOS via env. Mínimo 256 bits Base64.
# Gerar: openssl rand -base64 64
mydelivery.afiliados.jwt-secret=${JWT_SECRET_AFILIADOS:}
mydelivery.afiliados.jwt-expira-horas=12

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# EMAIL (Gmail SMTP)
# Senha de app fornecida pelo dono: configurar via env em produção.
# Em dev local, usar fallback do .env.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:gpsozza3@gmail.com}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Comissão padrão (novos afiliados começam com esse valor)
# Admin pode alterar por afiliado depois.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mydelivery.afiliados.comissao-percentual-padrao=33.33

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WEBHOOK INBOUND (mydelivery-api avisa essa API quando um restaurante
# vinculado assina/cancela). Compartilhado segredo X-Webhook-Secret.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mydelivery.afiliados.webhook-secret=${AFILIADOS_WEBHOOK_SECRET:}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ADMIN do painel afiliados (login hardcoded em V1)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mydelivery.afiliados.admin-email=${AFILIADOS_ADMIN_EMAIL:gpsozza3@gmail.com}
mydelivery.afiliados.admin-senha=${AFILIADOS_ADMIN_SENHA:}

# URL pública do painel (usado nos emails)
mydelivery.afiliados.painel-url=${AFILIADOS_PAINEL_URL:https://afiliados.mydeliveryfood.com.br}

# URL pública do site MyDelivery (usado pra gerar links de afiliado)
mydelivery.afiliados.checkout-base-url=${MYDELIVERY_PUBLIC_URL:https://mydeliveryfood.com.br}

# Logging — INFO em prod, DEBUG só pro nosso package em dev se quiser.
logging.level.com.myafiliados=INFO

# CORS — restringir aos hosts permitidos. Mantém aberto em dev pra Vite/Live Server.
mydelivery.afiliados.cors-allowed-origins=${CORS_ORIGINS_AFILIADOS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,https://afiliados.mydeliveryfood.com.br}
